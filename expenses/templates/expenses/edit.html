{% extends 'expenses/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <div class="d-flex align-items-center mb-4">
    <a href="javascript:history.back()" class="btn btn-secondary me-3">
        <i class="bi bi-arrow-left"></i> Back
    </a>
    <h4 class="mb-0">Edit Expense</h4>
</div>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ expense.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount</label>
                        <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ expense.amount }}" required>
                    </div>
                    <div class="mb-3">
    <label for="category" class="form-label">Category</label>
    <select class="form-select" id="category" name="category">
        <option value="">Select Category</option>
        {% for category in categories %}
            <option value="{{ category.id }}" {% if expense.category.id == category.id %}selected{% endif %} style="color: {{ category.color }};">
                <i class="bi {{ category.icon }}"></i> {{ category.name }}
            </option>
        {% endfor %}
    </select>
</div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="date" name="date" value="{{ expense.date|date:'Y-m-d' }}">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ expense.description }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Update Expense</button>
                    <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
