{% extends 'expenses/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <div class="d-flex align-items-center mb-4">
    <a href="javascript:history.back()" class="btn btn-secondary me-3">
        <i class="bi bi-arrow-left"></i> Back
    </a>
    <h4 class="mb-0">Delete Expense</h4>
</div>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete this expense?</p>
                <div class="alert alert-warning">
                    <strong>{{ expense.title }}</strong> - ₹{{ expense.amount|floatformat:2 }}
                </div>
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
