{% extends 'expenses/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">💰 Set Monthly Budget</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="monthly_budget" class="form-label">Monthly Budget (₹)</label>
                        <input type="number" step="0.01" class="form-control" id="monthly_budget" name="monthly_budget" 
                               value="{{ budget.monthly_budget|floatformat:2 }}" required>
                        <small class="text-muted">Set your monthly spending limit</small>
                    </div>
                    
                    <div class="mb-3">
                        <p>Current Month Spending: <strong>₹{{ total_amount|floatformat:2 }}</strong></p>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Save Budget</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
