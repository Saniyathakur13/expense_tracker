services:
  - type: web
    name: expense-tracker
    env: python
    buildCommand: |
      echo "Installing dependencies..."
      pip install --upgrade pip
      pip install -r requirements.txt
      echo "Collecting static files..."
      python manage.py collectstatic --noinput
    startCommand: python -m gunicorn expense_tracker_project.wsgi:application --workers=1 --threads=2 --timeout=90
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: PYTHON_VERSION
        value: 3.11.9
